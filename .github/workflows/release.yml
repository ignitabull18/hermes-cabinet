name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json $PACKAGE_VERSION"
            exit 1
          fi

      - name: Generate release manifest
        run: node scripts/generate-release-manifest.mjs --tag "$GITHUB_REF_NAME" --git-commit "$GITHUB_SHA"

      - name: Build web app
        run: npm run build

      - name: Create GitHub draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            cabinet-release.json

  publish-app-bundles:
    runs-on: ${{ matrix.runner }}
    needs: release-assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            bundleKey: linux-x64
          - runner: ubuntu-24.04-arm
            bundleKey: linux-arm64
          - runner: macos-15-intel
            bundleKey: darwin-x64
          - runner: macos-14
            bundleKey: darwin-arm64
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build && npm run electron:prep

      - name: Package app bundle
        id: package
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE_NAME="cabinet-app-${{ matrix.bundleKey }}-v${TAG_VERSION}.tgz"
          tar -czf "$BUNDLE_NAME" -C .next/standalone .
          node -e "
            const{createHash}=require('crypto'),{readFileSync}=require('fs');
            process.stdout.write(createHash('sha256').update(readFileSync('$BUNDLE_NAME')).digest('hex')+'\n')
          " > "$BUNDLE_NAME.sha256"
          echo "bundle_name=$BUNDLE_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload app bundle to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            ${{ steps.package.outputs.bundle_name }}
            ${{ steps.package.outputs.bundle_name }}.sha256

  publish-cabinetai:
    runs-on: ubuntu-latest
    needs: publish-app-bundles
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: cabinetai
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Authenticate with the granular npm token stored as the NPM_TOKEN
      # Actions secret. id-token: write remains enabled for provenance.
      - name: Publish cabinetai
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cli:
    runs-on: ubuntu-latest
    needs: publish-cabinetai
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      # Use the same granular npm token for create-cabinet. The token must have
      # write access to both packages.
      - name: Publish create-cabinet
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
