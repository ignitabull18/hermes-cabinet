name: CI

# Runs on every PR (and pushes to main) so a broken build or a broken
# install flow is caught before merge, not after a release goes out.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Blocking gate: the build must compile + type-check, the standalone bundle
  # must assemble, and BOTH install flows must work: the npx download/extract
  # path (test:zero-install) and the `cabinetai run` boot path (test:bundle,
  # which asserts the app + daemon actually serve health). This is the check
  # that would have caught the type-error build break and any native-module /
  # boot regression in the install flow.
  build-and-install-smoke:
    name: Build & install-flow smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Assemble standalone bundle
        run: npm run electron:prep

      - name: Install-path smoke test (download → extract → validate)
        run: npm run test:zero-install

      - name: Boot smoke test (cabinetai run → app + daemon health)
        run: npm run test:bundle

      # The e2e job runs `next start` against this, rather than rebuilding.
      # include-hidden-files is REQUIRED: upload-artifact@v4 skips hidden files
      # by default, and `.next` is a hidden directory. Without it the upload
      # silently matches nothing, publishes no artifact, and still reports green,
      # while the e2e job fails downstream with "Artifact not found".
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next
            !.next/cache
          include-hidden-files: true
          retention-days: 1

  # Blocking. This job used to carry `continue-on-error: true`, justified by
  # "pre-existing failures on a clean checkout". That justification was stale:
  # lint passes (0 errors), and the suite was 353/354. The single failure was
  # cabinet-v2 reading an ambient, git-ignored data/ dir. That fixture is now
  # committed (test/support/fixtures/seed-cabinet), so the suite is hermetic
  # and 354 unit tests are a real gate instead of decoration.
  lint-and-unit:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  # Blocking, and safe to block: the e2e drives a real browser against a real
  # app + daemon, but the coding agent it talks to is a FAKE CLI emitting canned
  # stream JSON. No API key, no network, no model nondeterminism, so this runs
  # on fork PRs and cannot flake on a model's mood. Audits against the REAL
  # agent CLIs are metered and nondeterministic, so they live in the nightly
  # agent-audits workflow and never gate a merge.
  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: build-and-install-smoke
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next

      # The harness runs `next start`, which needs a real build. Fail loudly here
      # rather than deep inside Playwright if the artifact ever arrives empty.
      - name: Verify build artifact
        run: test -f .next/BUILD_ID || { echo "::error::.next/BUILD_ID missing — the build artifact did not download"; exit 1; }

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run e2e
        run: npm run test:e2e

      - name: Upload traces & screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
