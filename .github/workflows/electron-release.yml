name: Electron Release (manual)

# Triggered manually after npm publish + smoke tests pass.
# macOS job: builds, signs, notarizes, and publishes the Cabinet Electron app.
# Windows job: builds the ZIP + Squirrel installer via electron:make:win and
# attaches them to the release. Both target the existing GitHub release for the tag.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g., v0.4.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  electron-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Import Apple Developer certificate
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build and publish Electron app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: npm run build && npm run electron:prep && npx electron-forge publish

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true

  electron-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # Produces the portable ZIP (MakerZIP win32) and the Squirrel .exe
      # installer (+ .nupkg + RELEASES) under out/make/. Failing here blocks
      # the Windows release before any artifact is published.
      - name: Build Windows Electron app (ZIP + Squirrel installer)
        run: npm run electron:make:win

      # Always keep the build for download/smoke-testing, even if the upload
      # step below is skipped (e.g. the release doesn't exist yet).
      - name: Upload Windows build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cabinet-windows-${{ inputs.tag }}
          path: out/make/**
          if-no-files-found: warn

      - name: Attach Windows artifacts to the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ inputs.tag }}" \
            out/make/zip/win32/x64/* \
            out/make/squirrel.windows/x64/* \
            --clobber
